<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sentiment Analyzer - SPB AI Club</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

  <header class="site-header">
    <div class="header-logo">
      <div class="logo-mark">SA</div>
      <div>
        <div class="header-title">Market Sentiment Analyzer</div>
        <div class="header-sub">SPB AI &amp; Data Science Club</div>
      </div>
    </div>
    <a href="https://github.com/SPB-AI-Data-Science-Club/sentiment-analyzer" target="_blank" class="header-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
      </svg>
      GitHub
    </a>
  </header>

  <div class="main">

    <div class="input-panel">
      <div>
        <div class="input-label">Headline</div>
        <textarea id="inputText" placeholder="Enter a financial news headline..."></textarea>
      </div>

      <button class="analyze-btn" id="analyzeBtn" onclick="analyze()">Analyze</button>

      <div class="result-card" id="resultCard">
        <div class="result-label" id="resultLabel"></div>
        <div class="score-bars">
          <div class="score-row">
            <div class="score-meta">
              <span class="score-name">Bullish</span>
              <span class="score-pct" id="pctBullish">0%</span>
            </div>
            <div class="score-track">
              <div class="score-fill" id="fillBullish" style="background:#4ade80"></div>
            </div>
          </div>
          <div class="score-row">
            <div class="score-meta">
              <span class="score-name">Neutral</span>
              <span class="score-pct" id="pctNeutral">0%</span>
            </div>
            <div class="score-track">
              <div class="score-fill" id="fillNeutral" style="background:#fbbf24"></div>
            </div>
          </div>
          <div class="score-row">
            <div class="score-meta">
              <span class="score-name">Bearish</span>
              <span class="score-pct" id="pctBearish">0%</span>
            </div>
            <div class="score-track">
              <div class="score-fill" id="fillBearish" style="background:#f87171"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="samples-panel">
      <div class="samples-label">Sample Headlines</div>
      {% for s in samples %}
      <div class="sample-item" onclick="useSample(this)">{{ s }}</div>
      {% endfor %}
    </div>

  </div>

  <script>
    function useSample(el) {
      document.getElementById('inputText').value = el.textContent.trim();
    }

    async function analyze() {
      const text = document.getElementById('inputText').value.trim();
      if (!text) return;

      const btn = document.getElementById('analyzeBtn');
      btn.disabled = true;
      btn.textContent = 'Analyzing...';

      try {
        const res  = await fetch('/api/analyze', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ text }),
        });
        const data = await res.json();
        if (data.error) { alert(data.error); return; }

        const card = document.getElementById('resultCard');
        card.classList.add('visible');

        const lbl = document.getElementById('resultLabel');
        lbl.textContent  = data.label;
        lbl.style.color  = data.color;

        setBar('Bullish', data.scores['Bullish']);
        setBar('Neutral',  data.scores['Neutral']);
        setBar('Bearish',  data.scores['Bearish']);

      } catch (err) {
        alert('Request failed: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Analyze';
      }
    }

    function setBar(name, pct) {
      document.getElementById('pct'  + name).textContent = pct.toFixed(1) + '%';
      document.getElementById('fill' + name).style.width = Math.min(pct, 100) + '%';
    }

    document.getElementById('inputText').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); analyze(); }
    });
  </script>
</body>
</html>
